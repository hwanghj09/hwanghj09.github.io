<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>내가 만든 것들</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f2ea;
      --surface: #fcf8f1;
      --card: #ffffff;
      --card-hover: #fff8ee;
      --border: rgba(16,16,24,0.08);
      --border-hover: rgba(16,16,24,0.18);
      --ink: #141318;
      --muted: #6a6574;
      --accent: #ff5a3d;
      --accent-2: #1fb8a2;
      --accent-3: #3f37c9;
      --glow-orange: rgba(255,90,61,0.18);
      --glow-teal: rgba(31,184,162,0.18);
      --bg-grid: rgba(20,19,24,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Space Grotesk", "Nanum Myeongjo", serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body.mode-3d {
      overflow: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(transparent 24px, var(--bg-grid) 25px),
        linear-gradient(90deg, transparent 24px, var(--bg-grid) 25px),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 25px 25px, 25px 25px, auto;
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
    }
    body.mode-3d::before { opacity: 0; }

    /* ── AMBIENT BLOBS ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body.mode-3d .blob { display: none; }
    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--glow-orange) 0%, transparent 70%);
      top: -200px; left: -150px;
      animation: drift1 20s ease-in-out infinite;
    }
    .blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--glow-teal) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: drift2 25s ease-in-out infinite;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(63,55,201,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      animation: drift3 18s ease-in-out infinite;
    }
    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,60px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-80px)} }
    @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%)} 33%{transform:translate(-40%,-60%)} 66%{transform:translate(-60%,-40%)} }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      padding: 80px 40px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      flex-wrap: wrap;
    }

    .header-label {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-label::before {
      content: "";
      display: block;
      width: 24px; height: 1px;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--ink) 0%, #8b87a1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-count {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      line-height: 1.8;
      flex-shrink: 0;
    }
    .header-count strong {
      display: block;
      font-size: 36px;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 560px;
    }

    .theme-toggle {
      border: 1px solid var(--border-hover);
      background: var(--surface);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 14px;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border 200ms ease, transform 200ms ease, background 200ms ease;
    }
    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }
    .theme-toggle svg { width: 14px; height: 14px; }

    /* ── DIVIDER ── */
    .divider {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto 48px;
      padding: 0 40px;
    }
    .divider-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
    }

    /* ── GRID ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 12px;
      min-width: 260px;
      flex: 1;
      max-width: 520px;
    }
    .search svg { width: 16px; height: 16px; color: var(--muted); }
    .search input {
      border: none;
      outline: none;
      background: transparent;
      color: var(--ink);
      width: 100%;
      font-size: 14px;
      font-family: "Space Grotesk", "Nanum Myeongjo", serif;
    }
    .search input::placeholder { color: var(--muted); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tool-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toggle-btn {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 200ms ease;
    }
    .toggle-btn:hover { border-color: var(--accent); color: var(--ink); }
    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    #world3d {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
    }
    #hud3d {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      pointer-events: none;
      color: #f2f2f6;
      font-family: "Space Grotesk", "Nanum Myeongjo", serif;
    }
    body.mode-3d #world3d,
    body.mode-3d #hud3d {
      display: block;
    }
    body.mode-3d header,
    body.mode-3d .divider,
    body.mode-3d main,
    body.mode-3d footer {
      display: none;
    }
    #hud3d .panel {
      position: absolute;
      background: rgba(12,12,16,0.6);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 14px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      font-size: 12px;
      letter-spacing: 0.04em;
      line-height: 1.6;
      color: #c7c7d4;
      pointer-events: none;
    }
    #hud3d #hudTitle { top: 16px; left: 16px; }
    #hud3d #hudTitle { pointer-events: auto; display: inline-flex; gap: 10px; align-items: center; }
    #hud3d #hudTitle button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    #hud3d #hudLabel { top: 16px; right: 16px; text-align: right; min-width: 180px; }
    #hud3d #hudLabel strong { color: #fff; display: block; font-size: 14px; }
    #hud3d #hudHint { bottom: 16px; left: 16px; max-width: 360px; }
    #hud3d #hudLock {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(800px 400px at 50% 30%, rgba(61,243,179,0.12), transparent 70%), rgba(0,0,0,0.35);
      color: #fff;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.06em;
      cursor: pointer;
      pointer-events: auto;
    }
    #hud3d #hudLock.hidden { display: none; }
    #hud3d #hudCrosshair {
      position: absolute;
      left: 50%; top: 50%;
      width: 10px; height: 10px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(61,243,179,0.35);
    }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 200ms ease;
    }
    .chip:hover { border-color: var(--accent); color: var(--ink); }
    .chip.active {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: #0b0b0f;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      position: relative;
    }

    .grid.chaos {
      display: block;
      min-height: 800px;
    }
    .grid.chaos .card {
      position: absolute;
      width: var(--cw, clamp(240px, 28vw, 320px));
      height: var(--ch, auto);
      cursor: grab;
      touch-action: none;
    }
    .grid.chaos .card:hover {
      z-index: 999;
    }
    .grid.chaos .card.dragging {
      cursor: grabbing;
    }
    .handle { display: none; }
    .grid.chaos .card .handle {
      display: grid;
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border-hover);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
      display: grid;
      place-items: center;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      opacity: 0.85;
      transition: transform 180ms ease, opacity 180ms ease;
    }
    .grid.chaos .card:hover .handle { opacity: 1; }
    .grid.chaos .card .handle.resize {
      right: -8px;
      bottom: -8px;
      cursor: nwse-resize;
    }
    .grid.chaos .card .handle.rotate {
      left: 50%;
      top: -12px;
      transform: translateX(-50%);
      cursor: grab;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 200px;
      position: relative;
      overflow: hidden;
      transition: background 300ms ease, border-color 300ms ease, transform 320ms ease, box-shadow 320ms ease;
      cursor: default;
      opacity: 0;
      --rx: 0px;
      --ry: 0px;
      --rr: 0deg;
      --lift: 0px;
      transform: translate(var(--rx), calc(var(--ry) + 20px)) rotate(var(--rr));
      animation: fadeUp 0.5s forwards;
      box-shadow: 0 6px 22px rgba(0,0,0,0.06);
    }

    /* stagger */
    .card:nth-child(1)  { animation-delay: 0.04s; }
    .card:nth-child(2)  { animation-delay: 0.08s; }
    .card:nth-child(3)  { animation-delay: 0.12s; }
    .card:nth-child(4)  { animation-delay: 0.16s; }
    .card:nth-child(5)  { animation-delay: 0.20s; }
    .card:nth-child(6)  { animation-delay: 0.24s; }
    .card:nth-child(7)  { animation-delay: 0.28s; }
    .card:nth-child(8)  { animation-delay: 0.32s; }
    .card:nth-child(9)  { animation-delay: 0.36s; }
    .card:nth-child(10) { animation-delay: 0.40s; }
    .card:nth-child(11) { animation-delay: 0.44s; }
    .card:nth-child(12) { animation-delay: 0.48s; }
    .card:nth-child(13) { animation-delay: 0.52s; }
    .card:nth-child(14) { animation-delay: 0.56s; }
    .card:nth-child(15) { animation-delay: 0.60s; }
    .card:nth-child(16) { animation-delay: 0.64s; }
    .card:nth-child(17) { animation-delay: 0.68s; }
    .card:nth-child(18) { animation-delay: 0.72s; }
    .card:nth-child(19) { animation-delay: 0.76s; }
    .card:nth-child(20) { animation-delay: 0.80s; }
    .card:nth-child(21) { animation-delay: 0.84s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translate(var(--rx), var(--ry)) rotate(var(--rr)); }
    }

    /* top-left corner accent */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 0;
      background: var(--accent);
      transition: height 300ms ease;
    }

    /* glow on hover */
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(400px at var(--mx,50%) var(--my,50%), rgba(255,90,61,0.09), transparent 70%);
      opacity: 0;
      transition: opacity 300ms;
      pointer-events: none;
    }

    .card:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
      --lift: 4px;
      transform: translate(var(--rx), calc(var(--ry) - var(--lift))) rotate(var(--rr));
      z-index: 40;
      box-shadow: 0 14px 40px rgba(0,0,0,0.16);
    }
    .card:hover::before { height: 40px; }
    .card:hover::after  { opacity: 1; }

    /* card with link → teal accent */
    .card.has-link::before { background: var(--accent-2); }

    .card-num {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      position: absolute;
      top: 24px; right: 24px;
    }

    .tag {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tag-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .card.has-link .tag-dot { background: var(--accent-2); }
    .card.offline .tag-dot  { background: var(--muted); }

    .name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      flex: 1;
    }

    .desc {
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 4px;
      text-decoration: none;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.03em;
      border: 1px solid transparent;
      transition: all 200ms ease;
      white-space: nowrap;
    }
    .btn svg {
      width: 11px; height: 11px;
      flex-shrink: 0;
    }

    .btn.primary {
      background: var(--accent-2);
      color: #0b0b0f;
      border-color: var(--accent-2);
      font-weight: 700;
    }
    .btn.primary:hover {
      background: #2de8a8;
      border-color: #2de8a8;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(77,255,195,0.3);
    }

    .btn.ghost {
      border-color: var(--border-hover);
      color: var(--muted);
      background: transparent;
      overflow: hidden;
      max-width: 180px;
    }
    .btn.ghost span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn.ghost:hover {
      border-color: rgba(255,255,255,0.3);
      color: var(--ink);
    }

    .btn.disabled {
      border-color: var(--border);
      color: #8d8797;
      cursor: not-allowed;
      background: transparent;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 20px 60px;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    footer::before {
      content: "";
      display: block;
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--border), transparent);
      margin: 0 auto 20px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 60px 20px 40px; }
      main   { padding: 0 20px 60px; }
      .divider { padding: 0 20px; }
      .grid  { grid-template-columns: 1fr; gap: 14px; }
      h1     { font-size: 36px; }
      .header-top { align-items: flex-start; }
    }

    [data-theme="dark"] {
      --bg: #0b0b0f;
      --surface: #111118;
      --card: #16161f;
      --card-hover: #1c1c28;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.18);
      --ink: #f0ede8;
      --muted: #7a7890;
      --accent: #ff5f3d;
      --accent-2: #4dffc3;
      --accent-3: #a78bfa;
      --glow-orange: rgba(255,95,61,0.15);
      --glow-teal: rgba(77,255,195,0.12);
      --bg-grid: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <header>
    <div class="header-top">
      <div class="header-label">Portfolio</div>
      <button class="theme-toggle" type="button" aria-label="테마 변경">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v2M12 19v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M3 12h2M19 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/><circle cx="12" cy="12" r="4"/></svg>
        THEME
      </button>
    </div>
    <div class="header-inner">
      <div>
        <h1>내가 만든<br>것들</h1>
      </div>
      <div class="header-count">
        TOTAL PROJECTS<br>
        <strong id="projectCount">0</strong>
        계속 업데이트 중
      </div>
    </div>
  </header>

  <div class="divider"><div class="divider-line"></div></div>

  <main>
    <div class="toolbar">
      <label class="search" for="searchInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
        <input id="searchInput" type="search" placeholder="프로젝트 검색 (이름, 설명, 도메인)" />
      </label>
      <div class="filters" role="tablist" aria-label="필터">
        <button class="chip active" type="button" data-filter="all">ALL</button>
        <button class="chip" type="button" data-filter="has-link">LINK</button>
        <button class="chip" type="button" data-filter="offline">OFFLINE</button>
      </div>
      <div class="tool-actions">
        <button class="toggle-btn" id="physicsToggle" type="button">INERTIA</button>
        <button class="toggle-btn" id="threeDToggle" type="button">3D</button>
      </div>
    </div>
    <section class="grid" id="projectGrid"></section>
  </main>

  <footer>
    만든 프로젝트 정리 페이지 &nbsp;·&nbsp; 계속 업데이트 중
  </footer>

  <div id="world3d"></div>
  <div id="hud3d">
    <div id="hudTitle" class="panel">PROJECTS · 3D WORLD <button id="threeDExit" type="button">2D</button></div>
    <div id="hudLabel" class="panel"><strong>대상 없음</strong>가까이 가면 이름이 표시됩니다</div>
    <div id="hudHint" class="panel">클릭하면 마우스 고정 · WASD 이동 · 마우스로 시선 회전 · ESC 해제</div>
    <div id="hudCrosshair"></div>
    <div id="hudLock">클릭해서 3D 월드 입장</div>
  </div>

  <script>
    const projects = [
      { name: "Andamiro", desc: "학생의 멘토/멘티 웹", url: "https://andamiro.zstrit.com/" },
      { name: "GOOD-TOMATO", desc: "코딩 언어 및 명령어 학습 웹", url: "https://good-tomato.web.app/" },
      { name: "mapro", desc: "기출문제 데이터 변환 관리 웹", url: "https://mapro-tool.web.app/" },
      { name: "korean-dalgom", desc: "수이 달곰국어 웹", url: "https://korean-dalgom.zstrit.com/" },
      { name: "pghs-allclass", desc: "2026년도 판교고 반배정 확인", url: "https://hwanghj09.github.io/pghs-allclass" },
      { name: "ccc", desc: "문화창작부", url: "https://ccc-25.web.app/" },
      { name: "bie-yumushi", desc: "친구가 만들어달라고한 리퀘 받는거", url: "https://bie-yumushi.web.app/" },
      { name: "solveit-quiz", desc: "mapro 기출 문제 푸는 사이트", url: "https://solveit-quiz.vercel.app/" },
      { name: "Sphere-PGHS", desc: "2025 학교 동아리", url: null },
      { name: "pghs-haksulje", desc: "판교고 학술제 투표", url: "https://pghs-haksulje.web.app/" },
      { name: "What-We-Have-To-Do-Today", desc: "오늘의 TODO", url: "https://what-we-have-to-do-today.web.app/" },
      { name: "animaltest", desc: "동물 성격 테스트", url: "https://animaltest0308.web.app/" },
      { name: "mathgraph", desc: "수학 그래프 그리기", url: "https://hwanghj09.github.io/mathgraph" },
      { name: "pangyo25-104", desc: "판교고 2025 104 반 사이트", url: "http://pghs104.dothome.co.kr/" },
      { name: "23scienceportfolio", desc: "과학 포트폴리오", url: null },
      { name: "jslab", desc: "자바스크립트 실험실", url: null },
      { name: "donghyunlang", desc: "동현이 언어", url: "https://hwanghj09.github.io/donghyunlang/" },
      { name: "찾동", desc: "동아리 찾기", url: "https://chatdong.xyz/" },
      { name: "솔브잇", desc: "자기주도 학습", url: "https://solve-it.kro.kr/" },
      { name: "pghs-qna", desc: "판교고 QNA", url: "https://pghs-qna.web.app/" },
      { name: "KAIEF", desc: "대한민국 행사 파인어 챗봇", url: null },
      { name: "jaribakugi", desc: "자리바꾸기", url: "https://elilim09.github.io/jaribakugi/" },
      { name: "ScriptBox", desc: "개발자 디시", url: null },
      { name: "Sphere", desc: "학교 관리", url: null }
    ];

    const projectGrid = document.getElementById('projectGrid');
    const projectCount = document.getElementById('projectCount');

    const buildCards = (projects) => {
      projectGrid.innerHTML = "";
      if (projectCount) projectCount.textContent = String(projects.length);
      projects.forEach((p, i) => {
        const num = String(i + 1).padStart(2, "0");
        const card = document.createElement("article");
        const offline = !p.url;
        card.className = `card ${offline ? "offline" : "has-link"}`;
        card.style.animationDelay = `${(i + 1) * 0.04}s`;
        const domain = p.url ? new URL(p.url).host : "";
        card.innerHTML = `
          <span class="card-num">${num}</span>
          <div class="tag"><span class="tag-dot"></span>Project</div>
          <h3 class="name">${p.name}</h3>
          <p class="desc">${p.desc}</p>
          <div class="actions">
            ${p.url ? `
              <a class="btn primary" href="${p.url}" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 6h10M6 1l5 5-5 5"/></svg>
                바로가기
              </a>
              <span class="btn ghost"><span class="domain">${domain}</span></span>
            ` : `
              <span class="btn disabled">링크 없음</span>
            `}
          </div>
        `;
        projectGrid.appendChild(card);
      });
    };

    buildCards(projects);

    // mouse glow per card
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%';
        const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%';
        card.style.setProperty('--mx', x);
        card.style.setProperty('--my', y);
      });
    });

    const root = document.documentElement;
    const toggle = document.querySelector('.theme-toggle');
    const storedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');
    root.setAttribute('data-theme', initialTheme);

    toggle.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const searchInput = document.getElementById('searchInput');
    const chips = document.querySelectorAll('.chip');
    const cards = Array.from(document.querySelectorAll('.card'));
    const physicsToggle = document.getElementById('physicsToggle');
    const threeDToggle = document.getElementById('threeDToggle');

    const grid = document.querySelector('.grid');

    const ensureHandles = () => {
      cards.forEach(card => {
        if (card.querySelector('.handle.resize')) return;
        const resize = document.createElement('div');
        resize.className = 'handle resize';
        resize.title = '크기 조절';
        resize.innerHTML = '↘';

        const rotate = document.createElement('div');
        rotate.className = 'handle rotate';
        rotate.title = '회전';
        rotate.innerHTML = '⟳';

        card.appendChild(resize);
        card.appendChild(rotate);
      });
    };

    const applyChaosLayout = () => {
      const isDesktop = window.matchMedia('(min-width: 900px)').matches;
      const visibleCards = cards.filter(c => c.style.display !== 'none');

      if (!isDesktop) {
        grid.classList.remove('chaos');
        grid.style.height = '';
        cards.forEach(card => {
          card.style.left = '';
          card.style.top = '';
          card.style.position = '';
          card.style.removeProperty('--cw');
          card.style.removeProperty('--ch');
          card.style.setProperty('--rx', '0px');
          card.style.setProperty('--ry', '0px');
          card.style.setProperty('--rr', '0deg');
          delete card.dataset.chaos;
        });
        return;
      }

      grid.classList.add('chaos');
      ensureHandles();

      const gridWidth = grid.clientWidth;
      const padding = 14;
      const sizeCache = [];
      let totalHeight = 0;

      visibleCards.forEach(card => {
        const cw = 240 + Math.random() * 120;   // 240 ~ 360
        const ch = 190 + Math.random() * 120;   // 190 ~ 310
        card.style.setProperty('--cw', `${cw.toFixed(1)}px`);
        card.style.setProperty('--ch', `${ch.toFixed(1)}px`);
        sizeCache.push({ card, cw, ch });
        totalHeight += ch;
      });

      const avgHeight = sizeCache.length ? totalHeight / sizeCache.length : 220;
      const areaHeight = Math.max(window.innerHeight * 1.45, 260 + visibleCards.length * (avgHeight * 0.6));

      grid.style.height = `${Math.max(areaHeight, avgHeight + 220)}px`;

      const placed = [];
      const overlaps = (a, b) =>
        a.left < b.left + b.width + padding &&
        a.left + a.width + padding > b.left &&
        a.top < b.top + b.height + padding &&
        a.top + a.height + padding > b.top;

      sizeCache.forEach(({ card, cw, ch }, i) => {
        const maxLeft = Math.max(0, gridWidth - cw);
        const maxTop = Math.max(0, areaHeight - ch);
        let left = 0;
        let top = 0;
        let placedRect = null;

        for (let tries = 0; tries < 120; tries++) {
          left = Math.random() * maxLeft;
          top = Math.random() * maxTop;
          const rect = { left, top, width: cw, height: ch };
          if (!placed.some(p => overlaps(rect, p))) {
            placedRect = rect;
            break;
          }
        }

        if (!placedRect) {
          const cols = Math.max(1, Math.floor(gridWidth / (cw + padding)));
          const col = i % cols;
          const row = Math.floor(i / cols);
          left = col * (cw + padding);
          top = row * (ch + padding);
          placedRect = { left, top, width: cw, height: ch };
        }

        placed.push(placedRect);

        const rr = (Math.random() * 2 - 1) * 4.2;
        const rx = (Math.random() * 2 - 1) * 8;
        const ry = (Math.random() * 2 - 1) * 8;

        card.style.left = `${left.toFixed(1)}px`;
        card.style.top = `${top.toFixed(1)}px`;
        card.style.setProperty('--rx', `${rx.toFixed(1)}px`);
        card.style.setProperty('--ry', `${ry.toFixed(1)}px`);
        card.style.setProperty('--rr', `${rr.toFixed(2)}deg`);
        card.style.zIndex = `${Math.floor(Math.random() * 9) + 1}`;
        card.dataset.chaos = '1';
      });
    };

    const enableDrag = () => {
      let active = null;
      let offsetX = 0;
      let offsetY = 0;
      let mode = 'move';
      let baseLeft = 0;
      let baseTop = 0;
      let lastX = 0;
      let lastY = 0;
      let lastT = 0;

      const onDown = (e) => {
        if (!grid.classList.contains('chaos')) return;
        const card = e.target.closest('.card');
        if (!card) return;
        if (e.target.closest('a')) return;
        e.preventDefault();
        active = card;
        mode = e.target.classList.contains('resize') ? 'resize' :
               e.target.classList.contains('rotate') ? 'rotate' : 'move';
        active.classList.add('dragging');
        active.setPointerCapture(e.pointerId);
        active.style.zIndex = '999';

        const rect = active.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        baseLeft = parseFloat(active.style.left) || (rect.left - grid.getBoundingClientRect().left);
        baseTop = parseFloat(active.style.top) || (rect.top - grid.getBoundingClientRect().top);
        lastX = e.clientX;
        lastY = e.clientY;
        lastT = performance.now();
        active.dataset.vx = '0';
        active.dataset.vy = '0';
      };

      const onMove = (e) => {
        if (!active) return;
        const gridRect = grid.getBoundingClientRect();
        const cardRect = active.getBoundingClientRect();

        if (mode === 'move') {
          const maxLeft = Math.max(0, gridRect.width - cardRect.width);
          const maxTop = Math.max(0, gridRect.height - cardRect.height);
          let left = e.clientX - gridRect.left - offsetX;
          let top = e.clientY - gridRect.top - offsetY;
          left = Math.max(0, Math.min(maxLeft, left));
          top = Math.max(0, Math.min(maxTop, top));
          active.style.left = `${left.toFixed(1)}px`;
          active.style.top = `${top.toFixed(1)}px`;

          const now = performance.now();
          const dt = Math.max(1, now - lastT);
          active.dataset.vx = (((e.clientX - lastX) / dt) * 16).toFixed(2);
          active.dataset.vy = (((e.clientY - lastY) / dt) * 16).toFixed(2);
          lastX = e.clientX;
          lastY = e.clientY;
          lastT = now;
        } else if (mode === 'resize') {
          const minW = 220;
          const minH = 180;
          const newW = Math.max(minW, (e.clientX - gridRect.left) - baseLeft);
          const newH = Math.max(minH, (e.clientY - gridRect.top) - baseTop);
          active.style.setProperty('--cw', `${newW.toFixed(1)}px`);
          active.style.setProperty('--ch', `${newH.toFixed(1)}px`);
        } else if (mode === 'rotate') {
          const rect = active.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;
          const angle = Math.atan2(dy, dx) * (180 / Math.PI);
          active.style.setProperty('--rr', `${(angle).toFixed(2)}deg`);
        }
      };

      const onUp = (e) => {
        if (!active) return;
        active.classList.remove('dragging');
        active.releasePointerCapture(e.pointerId);
        if (physicsEnabled) {
          const vx = parseFloat(active.dataset.vx || '0');
          const vy = parseFloat(active.dataset.vy || '0');
          active.dataset.pvx = vx.toString();
          active.dataset.pvy = vy.toString();
          active.dataset.moving = '1';
          startPhysics();
        }
        active = null;
        mode = 'move';
      };

      grid.addEventListener('pointerdown', onDown);
      grid.addEventListener('pointermove', onMove);
      grid.addEventListener('pointerup', onUp);
      grid.addEventListener('pointercancel', onUp);
      grid.addEventListener('pointerleave', onUp);
    };

    let physicsEnabled = false;
    let physicsRunning = false;

    const getCardBox = (card) => {
      const left = parseFloat(card.style.left) || 0;
      const top = parseFloat(card.style.top) || 0;
      const rect = card.getBoundingClientRect();
      const mass = Math.max(1, rect.width * rect.height);
      return { card, left, top, width: rect.width, height: rect.height, mass };
    };

    const resolveCollisions = (boxes) => {
      let collided = false;
      const soften = 0.55;
      const impulse = 0.035;
      for (let i = 0; i < boxes.length; i++) {
        for (let j = i + 1; j < boxes.length; j++) {
          const a = boxes[i];
          const b = boxes[j];
          const overlapX = Math.min(a.left + a.width, b.left + b.width) - Math.max(a.left, b.left);
          const overlapY = Math.min(a.top + a.height, b.top + b.height) - Math.max(a.top, b.top);
          if (overlapX > 0 && overlapY > 0) {
            collided = true;
            const totalMass = a.mass + b.mass;
            const wa = b.mass / totalMass; // lighter moves more
            const wb = a.mass / totalMass;
            if (overlapX < overlapY) {
              const push = overlapX * soften;
              a.left -= push * wa;
              b.left += push * wb;
              const va = parseFloat(a.card.dataset.pvx || '0');
              const vb = parseFloat(b.card.dataset.pvx || '0');
              a.card.dataset.pvx = (va - overlapX * impulse * wa).toFixed(2);
              b.card.dataset.pvx = (vb + overlapX * impulse * wb).toFixed(2);
            } else {
              const push = overlapY * soften;
              a.top -= push * wa;
              b.top += push * wb;
              const va = parseFloat(a.card.dataset.pvy || '0');
              const vb = parseFloat(b.card.dataset.pvy || '0');
              a.card.dataset.pvy = (va - overlapY * impulse * wa).toFixed(2);
              b.card.dataset.pvy = (vb + overlapY * impulse * wb).toFixed(2);
            }
          }
        }
      }
      return collided;
    };

    const startPhysics = () => {
      if (physicsRunning) return;
      physicsRunning = true;
      const friction = 0.92;

      const tick = () => {
        if (!physicsEnabled) {
          physicsRunning = false;
          return;
        }

        const gridRect = grid.getBoundingClientRect();
        const visibleCards = cards.filter(c => c.style.display !== 'none');
        if (visibleCards.length === 0) {
          physicsRunning = false;
          return;
        }

        const boxes = visibleCards.map(getCardBox);
        let anyMoving = false;
        boxes.forEach(box => {
          const card = box.card;
          let vx = parseFloat(card.dataset.pvx || '0');
          let vy = parseFloat(card.dataset.pvy || '0');
          if (card.dataset.moving === '1') anyMoving = true;
          box.left += vx;
          box.top += vy;

          const maxLeft = Math.max(0, gridRect.width - box.width);
          const maxTop = Math.max(0, gridRect.height - box.height);

          if (box.left < 0) { box.left = 0; vx *= -0.3; }
          if (box.top < 0) { box.top = 0; vy *= -0.3; }
          if (box.left > maxLeft) { box.left = maxLeft; vx *= -0.3; }
          if (box.top > maxTop) { box.top = maxTop; vy *= -0.3; }

          vx *= friction;
          vy *= friction;

          if (card.dataset.moving === '1') {
            card.dataset.pvx = vx.toString();
            card.dataset.pvy = vy.toString();
            if (Math.abs(vx) < 0.05 && Math.abs(vy) < 0.05) {
              card.dataset.moving = '0';
            }
          }
        });

        const collided = resolveCollisions(boxes);

        boxes.forEach(box => {
          box.card.style.left = `${box.left.toFixed(1)}px`;
          box.card.style.top = `${box.top.toFixed(1)}px`;
        });

        if (!anyMoving && !collided) {
          physicsRunning = false;
          return;
        }

        requestAnimationFrame(tick);
      };

      requestAnimationFrame(tick);
    };

    const getCardText = (card) => {
      const name = card.querySelector('.name')?.textContent || '';
      const desc = card.querySelector('.desc')?.textContent || '';
      const domain = card.querySelector('.domain')?.textContent || '';
      return `${name} ${desc} ${domain}`.toLowerCase();
    };

    const applyFilters = () => {
      const q = searchInput.value.trim().toLowerCase();
      const activeChip = document.querySelector('.chip.active');
      const filter = activeChip ? activeChip.dataset.filter : 'all';

      cards.forEach(card => {
        const matchesSearch = q === '' || getCardText(card).includes(q);
        const matchesFilter =
          filter === 'all' ||
          (filter === 'has-link' && card.classList.contains('has-link')) ||
          (filter === 'offline' && card.classList.contains('offline'));
        card.style.display = matchesSearch && matchesFilter ? '' : 'none';
      });
      applyChaosLayout();
    };

    searchInput.addEventListener('input', applyFilters);
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        applyFilters();
      });
    });

    applyChaosLayout();
    enableDrag();
    physicsToggle.addEventListener('click', () => {
      physicsEnabled = !physicsEnabled;
      physicsToggle.classList.toggle('active', physicsEnabled);
      if (physicsEnabled) {
        cards.forEach(c => {
          if (c.style.display !== 'none') c.dataset.moving = '1';
        });
        startPhysics();
      }
      if (!physicsEnabled) {
        cards.forEach(c => {
          c.dataset.moving = '0';
          c.dataset.pvx = '0';
          c.dataset.pvy = '0';
        });
      }
    });

    let mode3d = false;
    let threeInited = false;
    const world3d = document.getElementById('world3d');
    const hudLabel3d = document.getElementById('hudLabel');
    const hudLock3d = document.getElementById('hudLock');
    const threeDExit = document.getElementById('threeDExit');
    const threeState = { scene: null, camera: null, renderer: null, boxes: [] };

    const getProjects = () => cards.map(card => ({
      name: card.querySelector('.name')?.textContent || 'Project',
      desc: card.querySelector('.desc')?.textContent || ''
    }));

    const setMode3D = async (on) => {
      mode3d = on;
      document.body.classList.toggle('mode-3d', on);
      threeDToggle.classList.toggle('active', on);
      if (on) {
        if (!threeInited) await init3D();
      } else {
        if (threeState.renderer && document.pointerLockElement === threeState.renderer.domElement) {
          document.exitPointerLock();
        }
      }
    };

    threeDToggle.addEventListener('click', () => {
      setMode3D(!mode3d);
    });
    threeDExit.addEventListener('click', () => {
      setMode3D(false);
    });

    const init3D = async () => {
      threeInited = true;
      const THREE = await import('https://unpkg.com/three@0.160.0/build/three.module.js');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0b10);
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(0, 6, 20);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
      world3d.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);
      const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
      keyLight.position.set(10, 20, 10);
      scene.add(keyLight);

      const floorGeo = new THREE.PlaneGeometry(2000, 2000, 20, 20);
      const floorMat = new THREE.MeshStandardMaterial({ color: 0x101018, roughness: 0.9, metalness: 0.1 });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      scene.add(floor);

      const boxes = [];
      const velocities = [];
      const masses = [];
      const palette = [0x3df3b3, 0x7b61ff, 0xff8a5b, 0x5bc0ff, 0xffd166];
      const projects = getProjects();

      const makeLabelTexture = (text) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const w = 768;
        const h = 320;
        canvas.width = w;
        canvas.height = h;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = 'rgba(12,12,16,0.85)';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 6;
        ctx.strokeRect(6, 6, w - 12, h - 12);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 62px Space Grotesk, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const safe = text.length > 16 ? text.slice(0, 16) + '…' : text;
        ctx.fillText(safe, w / 2, h / 2);
        const texture = new THREE.CanvasTexture(canvas);
        texture.anisotropy = 4;
        return texture;
      };

      projects.forEach((p, i) => {
        const w = 2 + Math.random() * 2.5;
        const h = 1.6 + Math.random() * 2.4;
        const d = 1.8 + Math.random() * 2.8;
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshStandardMaterial({
          color: palette[i % palette.length],
          roughness: 0.55,
          metalness: 0.25
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set((Math.random() - 0.5) * 80, h / 2, (Math.random() - 0.5) * 80);
        mesh.userData = p;
        scene.add(mesh);
        boxes.push(mesh);
        velocities.push(new THREE.Vector3());
        masses.push(Math.max(1, w * h * d));

        const labelMat = new THREE.MeshBasicMaterial({
          map: makeLabelTexture(p.name),
          transparent: true
        });
        const labelGeo = new THREE.PlaneGeometry(Math.max(2.2, w * 1.05), Math.max(0.9, h * 0.42));
        const label = new THREE.Mesh(labelGeo, labelMat);
        label.position.set(0, 0, d / 2 + 0.02);
        label.userData.isLabel = true;
        mesh.add(label);
      });

      const keys = { w: false, a: false, s: false, d: false, space: false };
      let yaw = 0;
      let pitch = 0;
      const forward = new THREE.Vector3();
      const right = new THREE.Vector3();
      const raycaster = new THREE.Raycaster();
      const clock = new THREE.Clock();
      let velocityY = 0;
      const gravity = -28;
      const jumpSpeed = 12;
      const eyeHeight = 6;
      const footPad = 0.2;
      let airborne = false;
      const groundY = 0;
      let grabbed = null;
      let grabDistance = 6;
      let holding = false;
      let throwCharge = 0;
      let charging = false;

      window.addEventListener('keydown', (e) => {
        if (!mode3d) return;
        if (e.code === 'KeyW') keys.w = true;
        if (e.code === 'KeyA') keys.a = true;
        if (e.code === 'KeyS') keys.s = true;
        if (e.code === 'KeyD') keys.d = true;
        if (e.code === 'Space') {
          keys.space = true;
          if (Math.abs(velocityY) < 0.01) {
            velocityY = jumpSpeed;
            airborne = true;
          }
        }
        if (e.code === 'Escape') {
          setMode3D(false);
        }
      });
      window.addEventListener('keyup', (e) => {
        if (!mode3d) return;
        if (e.code === 'KeyW') keys.w = false;
        if (e.code === 'KeyA') keys.a = false;
        if (e.code === 'KeyS') keys.s = false;
        if (e.code === 'KeyD') keys.d = false;
        if (e.code === 'Space') keys.space = false;
      });
      window.addEventListener('mousemove', (e) => {
        if (!mode3d) return;
        if (document.pointerLockElement !== renderer.domElement) return;
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
      });
      renderer.domElement.addEventListener('contextmenu', (e) => {
        e.preventDefault();
      });
      window.addEventListener('mousedown', (e) => {
        if (!mode3d) return;
        if (document.pointerLockElement !== renderer.domElement) return;
        if (e.button === 2) {
          if (holding && grabbed) {
            charging = true;
            throwCharge = 0;
          }
          return;
        }
        if (e.button !== 0) return;
        raycaster.setFromCamera({ x: 0, y: 0 }, camera);
        const hits = raycaster.intersectObjects(boxes, false);
        if (hits.length) {
          grabbed = hits[0].object;
          grabDistance = Math.max(3, Math.min(10, hits[0].distance));
          holding = true;
        }
      });
      window.addEventListener('mouseup', (e) => {
        if (e.button === 2) {
          if (holding && grabbed && charging) {
            const idx = boxes.indexOf(grabbed);
            if (idx >= 0) {
              const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation).normalize();
              const strength = 6 + Math.min(28, throwCharge);
              velocities[idx].addScaledVector(dir, strength);
            }
            charging = false;
            throwCharge = 0;
            holding = false;
            grabbed = null;
          }
          return;
        }
        if (e.button !== 0) return;
        holding = false;
        grabbed = null;
      });
      window.addEventListener('contextmenu', (e) => e.preventDefault());

      hudLock3d.addEventListener('click', () => {
        if (!mode3d) return;
        renderer.domElement.requestPointerLock();
      });
      document.addEventListener('pointerlockchange', () => {
        const locked = document.pointerLockElement === renderer.domElement;
        hudLock3d.classList.toggle('hidden', locked);
      });

      const loop = () => {
        requestAnimationFrame(loop);
        if (!mode3d) return;

        const dt = Math.min(0.05, clock.getDelta());
        camera.rotation.set(pitch, yaw, 0, 'YXZ');

        const speed = 12;
        forward.set(0, 0, -1).applyEuler(camera.rotation).setY(0).normalize();
        right.set(1, 0, 0).applyEuler(camera.rotation).setY(0).normalize();

        if (keys.w) camera.position.addScaledVector(forward, speed * dt);
        if (keys.s) camera.position.addScaledVector(forward, -speed * dt);
        if (keys.a) camera.position.addScaledVector(right, -speed * dt);
        if (keys.d) camera.position.addScaledVector(right, speed * dt);

        // vertical movement (gravity + ground/blocks)
        velocityY += gravity * dt;
        camera.position.y += velocityY * dt;
        // ground floor
        if (camera.position.y < groundY + eyeHeight) {
          camera.position.y = groundY + eyeHeight;
          velocityY = 0;
          airborne = false;
        }
        if (camera.position.y > groundY + eyeHeight + 0.02) {
          airborne = true;
        }

        // stand on blocks when landing
        const downRay = new THREE.Raycaster(
          camera.position,
          new THREE.Vector3(0, -1, 0),
          0,
          eyeHeight + 6
        );
        const hitsDown = downRay.intersectObjects(boxes, false);
        if (airborne && hitsDown.length) {
          const hit = hitsDown[0];
          const targetY = hit.point.y + eyeHeight;
          if (camera.position.y <= targetY + footPad && velocityY <= 0) {
            camera.position.y = targetY;
            velocityY = 0;
            airborne = false;
          }
        }

        raycaster.setFromCamera({ x: 0, y: 0 }, camera);
        const hits = raycaster.intersectObjects(boxes, false);
        if (hits.length) {
          const hit = hits[0].object.userData;
          hudLabel3d.innerHTML = `<strong>${hit.name}</strong>${hit.desc}`;
        } else {
          hudLabel3d.innerHTML = `<strong>대상 없음</strong>가까이 가면 이름이 표시됩니다`;
        }

        if (grabbed && holding) {
          const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
          const target = camera.position.clone().add(dir.multiplyScalar(grabDistance));
          const idx = boxes.indexOf(grabbed);
          grabbed.position.lerp(target, 0.25);
          if (idx >= 0) velocities[idx].set(0, 0, 0);
        }

        if (charging) {
          throwCharge = Math.min(30, throwCharge + dt * 35);
        }

        // physics for boxes
        const boxGravity = -18;
        const damping = 0.985;
        for (let i = 0; i < boxes.length; i++) {
          const box = boxes[i];
          if (holding && box === grabbed) continue;
          velocities[i].y += boxGravity * dt;
          box.position.addScaledVector(velocities[i], dt);

          // floor
          const halfY = box.geometry.parameters.height / 2;
          if (box.position.y < halfY) {
            box.position.y = halfY;
            velocities[i].y *= -0.3;
          }

          velocities[i].multiplyScalar(damping);
        }

        // box-box interactions
        for (let pass = 0; pass < 3; pass++) {
          for (let i = 0; i < boxes.length; i++) {
            for (let j = i + 1; j < boxes.length; j++) {
              const a = boxes[i];
              const b = boxes[j];
              const sizeA = new THREE.Vector3();
              const sizeB = new THREE.Vector3();
              new THREE.Box3().setFromObject(a).getSize(sizeA);
              new THREE.Box3().setFromObject(b).getSize(sizeB);
              const dx = a.position.x - b.position.x;
              const dy = a.position.y - b.position.y;
              const dz = a.position.z - b.position.z;
              const overlapX = (sizeA.x + sizeB.x) / 2 - Math.abs(dx);
              const overlapY = (sizeA.y + sizeB.y) / 2 - Math.abs(dy);
              const overlapZ = (sizeA.z + sizeB.z) / 2 - Math.abs(dz);
              if (overlapX > 0 && overlapY > 0 && overlapZ > 0) {
                const totalMass = masses[i] + masses[j];
                const wa = masses[j] / totalMass;
                const wb = masses[i] / totalMass;
                if (overlapX <= overlapY && overlapX <= overlapZ) {
                  const push = overlapX * 0.6;
                  a.position.x += Math.sign(dx) * push * wa;
                  b.position.x -= Math.sign(dx) * push * wb;
                  velocities[i].x += Math.sign(dx) * 0.18 * wa;
                  velocities[j].x -= Math.sign(dx) * 0.18 * wb;
                } else if (overlapY <= overlapX && overlapY <= overlapZ) {
                  const push = overlapY * 0.6;
                  a.position.y += Math.sign(dy) * push * wa;
                  b.position.y -= Math.sign(dy) * push * wb;
                  velocities[i].y += Math.sign(dy) * 0.18 * wa;
                  velocities[j].y -= Math.sign(dy) * 0.18 * wb;
                } else {
                  const push = overlapZ * 0.6;
                  a.position.z += Math.sign(dz) * push * wa;
                  b.position.z -= Math.sign(dz) * push * wb;
                  velocities[i].z += Math.sign(dz) * 0.18 * wa;
                  velocities[j].z -= Math.sign(dz) * 0.18 * wb;
                }
              }
            }
          }
        }


        renderer.render(scene, camera);
      };

      window.addEventListener('resize', () => {
        if (!threeState.camera || !threeState.renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      threeState.scene = scene;
      threeState.camera = camera;
      threeState.renderer = renderer;
      threeState.boxes = boxes;

      loop();
    };

    setMode3D(false);
    window.addEventListener('resize', applyChaosLayout);
  </script>
</body>
</html>
